name: APB-UART RTL Verification CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-simulate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Verilator and Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y verilator make g++

    - name: Lint RTL Source Files
      run: |
        verilator --lint-only -Wall rtl/uart.v rtl/apb_uart_bridge.v rtl/apb_uart_top.v

    - name: Compile and Build Simulation Testbench
      run: |
        verilator --binary -j 0 -Wall rtl/uart.v rtl/apb_uart_bridge.v rtl/apb_uart_top.v tb/apb_uart_tb.v --top apb_uart_tb --timing --trace -CFLAGS "-std=c++20"

    - name: Execute Simulation
      run: |
        cd obj_dir
        make -f Vapb_uart_tb.mk Vapb_uart_tb
        ./Vapb_uart_tb
